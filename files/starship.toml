# Main prompt format
format = """
$os$username$directory$git_branch$git_status$fill$nodejs$python$rust$golang
$character
"""

right_format = """${env_var.STARSHIP_RIGHT_STATUS}"""

# Catppuccin Mocha. The [palettes.catppuccin_mocha] table is generated
# from lib/catppuccin.nix (the repo's single source of truth for the palette)
# and appended to this file by modules/home/xdg-files.nix — do not add it here.
palette = "catppuccin_mocha"

[os]
disabled = false
symbols.Macos = "󰀵 "
symbols.Linux = " "
symbols.Windows = "󰍲 "
style = "bold blue"

[username]
format = "[$user]($style) "
show_always = true
style_user = "bold lavender"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold sapphire"
format = "[$path]($style) "
read_only = " 󰌾"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold mauve"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
ahead = "⇡"
behind = "⇣"
modified = "!"
untracked = "?"
stashed = "≡"
renamed = "r"
deleted = "✘"

[fill]
symbol = " "

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"

[python]
format = "[$symbol($version )($virtualenv)]($style)"
style = "bold yellow"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold peach"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold sapphire"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%R"
style = "bold overlay2"

[env_var.STARSHIP_RIGHT_STATUS]
variable = "STARSHIP_RIGHT_STATUS"
format = "[$env_value]($style) "
style = "bold overlay2"

[character]
success_symbol = "[∙](green)"
error_symbol = "[∙](red)"
vimcmd_symbol = "[∙](blue)"
vimcmd_visual_symbol = "[∙](yellow)"
vimcmd_replace_symbol = "[∙](red)"
vimcmd_replace_one_symbol = "[∙](red)"

[cmd_duration]
disabled = true
min_time = 1
format = "took [$duration]($style) "
style = "bold overlay2"
