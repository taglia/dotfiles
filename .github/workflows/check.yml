name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Evaluates every output for all systems (Linux and Darwin), catching
      # eval errors without needing a macOS runner to build the Darwin system.
      - name: nix flake check (evaluate all outputs)
        run: nix flake check --no-build --all-systems

      # Actually build the checks for the runner's own system (the x86_64-linux
      # Home Manager activation packages), so package/build failures are caught
      # too, not just eval errors. Darwin checks still can't build here.
      - name: nix flake check (build x86_64-linux checks)
        run: nix flake check

      - name: Shellcheck scripts
        run: find scripts files -name '*.sh' -type f -print0 | xargs -0 nix shell nixpkgs#shellcheck --command shellcheck

      - name: nixfmt check
        run: nix fmt -- --check

      - name: deadnix
        run: nix shell nixpkgs#deadnix --command deadnix --fail .

      - name: statix
        run: nix shell nixpkgs#statix --command statix check .

      - name: StyLua check
        run: nix shell nixpkgs#stylua --command stylua --check files/sketchybar

      - name: Prettier check
        run: nix shell nixpkgs#prettier --command prettier --check "files/**/*.ts"
