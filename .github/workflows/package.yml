name: Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create package
        id: package
        run: |
          archive="$(PACKAGE_DIR="$RUNNER_TEMP/dotfiles-package" ./scripts/package.sh)"
          release_archive="$RUNNER_TEMP/dotfiles.tar.gz"
          cp "$archive" "$release_archive"
          echo "archive=$release_archive" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
        run: |
          tag="dotfiles-package-latest"
          title="Latest dotfiles package"
          notes="Generated from commit ${GITHUB_SHA}."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force "$tag" "$GITHUB_SHA"
          git push --force origin "refs/tags/$tag"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$ARCHIVE" --clobber
            gh release edit "$tag" --title "$title" --notes "$notes" --latest
          else
            gh release create "$tag" "$ARCHIVE" --title "$title" --notes "$notes" --latest
          fi
